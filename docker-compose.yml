version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: demiurge-postgres
    environment:
      POSTGRES_USER: demiurge
      POSTGRES_PASSWORD: demiurge_pass
      POSTGRES_DB: demiurge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demiurge"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: demiurge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
