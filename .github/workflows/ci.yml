name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: demiurge
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: demiurge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://demiurge:test_pass@localhost:5432/demiurge_test
      REDIS_URL: redis://localhost:6379
      REDIS_PASSWORD: test
      DB_PASSWORD: test_pass
      JWT_SECRET: ci-test-jwt-secret-32chars-min!!!
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!
      JWT_GUEST_SECRET: ci-test-guest-secret-32chars!
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run migrations
        run: |
          PGPASSWORD=test_pass psql -h localhost -U demiurge -d demiurge_test -f server/src/db/schema.sql
        working-directory: server
      - run: npm test
        working-directory: server

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
