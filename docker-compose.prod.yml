services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: demiurge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-demiurge}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-demiurge}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-demiurge}"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: demiurge-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: demiurge-server
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_GUEST_SECRET: ${JWT_GUEST_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_URL: postgresql://${DB_USER:-demiurge}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-demiurge}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ROUTERAI_API_KEY: ${ROUTERAI_API_KEY}
      ROUTERAI_BASE_URL: ${ROUTERAI_BASE_URL:-https://routerai.ru/api/v1}
      YUKASSA_SHOP_ID: ${YUKASSA_SHOP_ID:-}
      YUKASSA_SECRET_KEY: ${YUKASSA_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: demiurge-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
  uploads:
